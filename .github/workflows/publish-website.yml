# Build private Hugo repo @younitystudios.com and publish 
# generated static site to public repo @www.younitystudios.com
name: Deploy static content to public repo

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private Hugo source
        uses: actions/checkout@v5

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.153.1'

      - name: Clone public repo into ./public
        run: |
          rm -rf public
          git clone https://x-access-token:${{ secrets.PAGES_REPO_TOKEN }}@github.com/YounityStudios/www.younitystudios.com.git public

      - name: Clean existing generated files
        run: |
          find public -mindepth 1 \
            ! -name ".git" \
            ! -path "public/.git/*" \
            -exec rm -rf {} +

      - name: Build static content
        run: npm run hugo:build

      - name: Commit and push generated site
        working-directory: public
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy Hugo site"
          git push origin main
